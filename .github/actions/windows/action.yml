name: "windows"

# Pinned upstream versions — bump these to upgrade.
# vcpkg release tag: 2026.06.24 (FFmpeg 8.1.2)

inputs:
  arch:
    description: "Target architecture suffix (e.g. x64, arm64)"
    required: true
  msystem:
    description: "MSYS2 environment (e.g. MINGW64, CLANGARM64)"
    required: true
  packages:
    description: "MSYS2 packages to install (newline-separated)"
    required: true
  triplet-prefix:
    description: "vcpkg triplet prefix (e.g. x64-mingw); -static and -dynamic are derived from it"
    required: true

runs:
  using: composite
  steps:
    - name: Install NASM
      uses: ilammy/setup-nasm@v1

    - name: Install MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ inputs.msystem }}
        update: true
        install: ${{ inputs.packages }}

    - name: Cache vcpkg binaries
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/vcpkg_cache
        key: vcpkg-${{ runner.os }}-${{ inputs.triplet-prefix }}-2026.06.24

    - name: Install vcpkg
      shell: bash
      run: |
        mkdir -p $GITHUB_WORKSPACE/static_${{ inputs.arch }}/lib
        mkdir -p $GITHUB_WORKSPACE/dynamic_${{ inputs.arch }}/lib
        mkdir -p $GITHUB_WORKSPACE/vcpkg_cache
        git clone --depth 1 --branch 2026.06.24 https://github.com/microsoft/vcpkg builder
        ./builder/bootstrap-vcpkg.sh

    - name: Build FFmpeg
      shell: msys2 {0}
      env:
        MSYS2_PATH_TYPE: inherit
        VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg_cache
      run: |
        # vaapi is Linux-only, so it is omitted from the Windows feature set.
        # rubberband's vcpkg port is unsupported on `windows & static`, so it is
        # only included in the dynamic build.
        STATIC_FEATURES="all-gpl,openssl,drawtext,zmq,dvdvideo"
        DYNAMIC_FEATURES="all-gpl,openssl,drawtext,rubberband,zmq,dvdvideo"
        ./builder/vcpkg install "ffmpeg[$STATIC_FEATURES]:${{ inputs.triplet-prefix }}-static"
        ./builder/vcpkg install "ffmpeg[$DYNAMIC_FEATURES]:${{ inputs.triplet-prefix }}-dynamic"

    - name: Prepare binaries
      shell: bash
      run: |
        cp -r $GITHUB_WORKSPACE/builder/installed/${{ inputs.triplet-prefix }}-static/include $GITHUB_WORKSPACE/static_${{ inputs.arch }}/
        for file in "$GITHUB_WORKSPACE"/builder/installed/${{ inputs.triplet-prefix }}-static/lib/*.a; do
          cp "$file" "$GITHUB_WORKSPACE/static_${{ inputs.arch }}/lib/"
        done

        cp -r $GITHUB_WORKSPACE/builder/installed/${{ inputs.triplet-prefix }}-dynamic/include $GITHUB_WORKSPACE/dynamic_${{ inputs.arch }}/
        for file in "$GITHUB_WORKSPACE"/builder/installed/${{ inputs.triplet-prefix }}-dynamic/bin/*.dll; do
          cp "$file" "$GITHUB_WORKSPACE/dynamic_${{ inputs.arch }}/lib/"
        done

    - name: Zip local
      shell: bash
      run: |
        cd $GITHUB_WORKSPACE/static_${{ inputs.arch }}
        7z a -tzip -mx=9 $GITHUB_WORKSPACE/static_windows_${{ inputs.arch }}.zip include lib

        cd $GITHUB_WORKSPACE/dynamic_${{ inputs.arch }}
        7z a -tzip -mx=9 $GITHUB_WORKSPACE/dynamic_windows_${{ inputs.arch }}.zip include lib

    - name: Save artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries-windows-${{ inputs.arch }}
        path: "*.zip"
