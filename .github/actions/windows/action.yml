name: "windows"

# Pinned upstream versions — bump these to upgrade.
# vcpkg release tag: 2026.06.24 (FFmpeg 8.1.2)

inputs:
  arch:
    description: "Target architecture suffix (e.g. x64, arm64)"
    required: true
  triplet-prefix:
    description: "vcpkg triplet prefix (e.g. x64-windows); static is <prefix>-static-md, dynamic is <prefix>"
    required: true

runs:
  using: composite
  steps:
    - name: Cache vcpkg binaries
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/vcpkg_cache
        key: vcpkg-${{ runner.os }}-${{ inputs.triplet-prefix }}-2026.06.24

    - name: Install vcpkg
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE/static_${{ inputs.arch }}/lib" | Out-Null
        New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE/dynamic_${{ inputs.arch }}/lib" | Out-Null
        New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE/vcpkg_cache" | Out-Null
        git clone --depth 1 --branch 2026.06.24 https://github.com/microsoft/vcpkg builder
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        & ./builder/bootstrap-vcpkg.bat
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        # Build only Release (skip Debug) for every triplet to roughly halve build time.
        # (vcpkg's windows.cmake hardcodes /Z7 in the release flags, embedding CodeView
        # debug info into every .obj/.lib — ~90% of the static .lib size. We can't strip
        # it at compile time: overriding /Z7 with /Zi races on a shared PDB and breaks
        # parallel autotools ports like gperf. Instead it's stripped post-build below.)
        Get-ChildItem -Path builder/triplets -Recurse -Filter *.cmake | ForEach-Object {
          Add-Content -Path $_.FullName -Value "`nset(VCPKG_BUILD_TYPE release)"
        }
        # libvpx cannot build as a shared library, so force it to static linkage even
        # in the dynamic triplet (it gets statically linked into the FFmpeg DLLs).
        Get-ChildItem -Path builder/triplets -Recurse -Filter *.cmake | ForEach-Object {
          Add-Content -Path $_.FullName -Value "`nif(PORT STREQUAL `"libvpx`")`n    set(VCPKG_LIBRARY_LINKAGE static)`nendif()"
        }

    - name: Build FFmpeg
      shell: pwsh
      env:
        VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg_cache
      run: |
        $ErrorActionPreference = "Stop"
        # Curated feature list (the all-gpl meta-feature pulls ports that cannot
        # build everywhere: tensorflow, tesseract, modplug, openmpt; rubberband
        # v4.0.0 fails to compile). Static archives use the MSVC static-md triplet
        # (static .lib, dynamic UCRT) so they link under the default *-pc-windows-msvc
        # Rust target. avisynthplus is `windows & !static`, so it's only valid on the
        # dynamic triplet; nvcodec/qsv are x64-only (ffnvcodec excludes arm64-windows,
        # libvpl is x86/x64 only).
        $BASE = "gpl,sdl2,aom,avcodec,avdevice,avfilter,avformat,bzip2,freetype,iconv,lzma,mp3lame,openjpeg,opus,snappy,soxr,speex,swresample,swscale,theora,twolame,vorbis,vpx,vulkan,webp,xml2,zlib,openssl,opencl,drawtext,zmq,dvdvideo,ass,fontconfig,fribidi,openh264,srt,dav1d,ilbc"
        if ("${{ inputs.arch }}" -eq "x64") {
          $STATIC = "$BASE,ssh,amf,opengl,nvcodec,qsv,x264,x265"
          $DYNAMIC = "$STATIC,avisynthplus"
        } else {
          # Windows-ARM: nvcodec/qsv unsupported (hard `supports` exclusion); opengl/ssh
          # dropped to keep the vcpkg plan valid. Unlike MinGW, MSVC builds x264/x265/vpx.
          $STATIC = "$BASE,amf,x264,x265"
          $DYNAMIC = "$STATIC"
        }
        & ./builder/vcpkg.exe install "ffmpeg[$STATIC]:${{ inputs.triplet-prefix }}-static-md"
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        & ./builder/vcpkg.exe install "ffmpeg[$DYNAMIC]:${{ inputs.triplet-prefix }}"
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    - name: Prepare binaries
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $st = "builder/installed/${{ inputs.triplet-prefix }}-static-md"
        $dy = "builder/installed/${{ inputs.triplet-prefix }}"
        # Static: MSVC .lib (static libs, dynamic UCRT) for *-pc-windows-msvc consumers.
        Copy-Item -Recurse -Force "$st/include" "static_${{ inputs.arch }}/include"
        Copy-Item -Force "$st/lib/*.lib" "static_${{ inputs.arch }}/lib/"
        # Dynamic: DLLs + their import libs.
        Copy-Item -Recurse -Force "$dy/include" "dynamic_${{ inputs.arch }}/include"
        Copy-Item -Force "$dy/bin/*.dll" "dynamic_${{ inputs.arch }}/lib/"
        Copy-Item -Force "$dy/lib/*.lib" "dynamic_${{ inputs.arch }}/lib/"

    - name: Strip debug info from libs
      shell: pwsh
      run: |
        # Strip the /Z7-embedded CodeView debug info (the .debug$S/.debug$T COFF
        # sections) from the static .lib files — it's ~90% of their size and isn't
        # needed to link against them. --strip-debug removes only debug sections,
        # keeping the symbol table so the libraries still link. Done post-build so it
        # can't break compilation. Only the static set is stripped: the dynamic set's
        # import libraries (short-import members) would trip up llvm-objcopy and aren't
        # bloated anyway.
        $objcopy = (Get-Command llvm-objcopy -ErrorAction SilentlyContinue).Source
        if (-not $objcopy) { $objcopy = "C:\Program Files\LLVM\bin\llvm-objcopy.exe" }
        if (-not (Test-Path $objcopy)) { choco install llvm -y; $objcopy = "C:\Program Files\LLVM\bin\llvm-objcopy.exe" }
        # Some MSVC libs carry members llvm-objcopy can't parse (e.g. LTCG/anonymous
        # objects -> "unsupported object file format"). Don't abort on those: strip to
        # a temp file and swap in only on success, otherwise skip (the lib stays
        # unstripped but still links).
        $ErrorActionPreference = "Continue"
        $PSNativeCommandUseErrorActionPreference = $false
        Get-ChildItem "static_${{ inputs.arch }}/lib" -Filter *.lib | ForEach-Object {
          $src = $_.FullName; $tmp = "$src.stripped"
          & $objcopy --strip-debug $src $tmp 2>$null
          if ($LASTEXITCODE -eq 0 -and (Test-Path $tmp)) {
            Move-Item -Force $tmp $src
          } else {
            if (Test-Path $tmp) { Remove-Item -Force $tmp }
            Write-Host "skip (unsupported by llvm-objcopy): $($_.Name)"
          }
        }
        exit 0

    - name: Zip local
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        Push-Location "static_${{ inputs.arch }}"
        7z a -tzip -mx=9 "$env:GITHUB_WORKSPACE/static_windows_${{ inputs.arch }}.zip" include lib
        Pop-Location
        Push-Location "dynamic_${{ inputs.arch }}"
        7z a -tzip -mx=9 "$env:GITHUB_WORKSPACE/dynamic_windows_${{ inputs.arch }}.zip" include lib
        Pop-Location

    - name: Save artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries-windows-${{ inputs.arch }}
        path: "*.zip"
