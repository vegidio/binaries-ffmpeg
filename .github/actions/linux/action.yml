name: "linux"

# Pinned upstream versions — bump these to upgrade.
# vcpkg release tag: 2026.06.24 (FFmpeg 8.1.2)

inputs:
  arch:
    description: "Target architecture suffix (e.g. x64, arm64)"
    required: true
  triplet:
    description: "vcpkg static triplet (e.g. x64-linux); the dynamic triplet is derived as <triplet>-dynamic"
    required: true

runs:
  using: composite
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        sudo apt-get update
        # libva-dev is intentionally NOT installed: vcpkg builds its own static
        # libva (2.23, has vaMapBuffer2) and we bundle it. A system libva-dev
        # (Ubuntu 24.04 ships 2.20) would shadow it via pkg-config and reintroduce
        # the vaMapBuffer2 undefined-reference. libdrm-dev stays (vcpkg's libva
        # needs the DRM headers); meson/ninja build the static libdrm.a we bundle.
        sudo apt-get install -y nasm yasm pkg-config autoconf autoconf-archive automake libtool libltdl-dev libdrm-dev libgl1-mesa-dev meson ninja-build
        mkdir -p $GITHUB_WORKSPACE/static_${{ inputs.arch }}/lib
        mkdir -p $GITHUB_WORKSPACE/dynamic_${{ inputs.arch }}/lib
        mkdir -p $GITHUB_WORKSPACE/vcpkg_cache

    - name: Cache vcpkg binaries
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/vcpkg_cache
        key: vcpkg-${{ runner.os }}-${{ inputs.triplet }}-2026.06.24

    - name: Install vcpkg
      shell: bash
      run: |
        git clone --depth 1 --branch 2026.06.24 https://github.com/microsoft/vcpkg builder
        ./builder/bootstrap-vcpkg.sh
        # Build only Release (skip Debug) for every triplet to roughly halve build time.
        find builder/triplets -name '*.cmake' -exec bash -c 'echo "set(VCPKG_BUILD_TYPE release)" >> "$1"' _ {} \;

    - name: Build FFmpeg
      shell: bash
      env:
        VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg_cache
      run: |
        # Curated feature list (the all-gpl meta-feature pulls ports that cannot
        # build across all triplets: tensorflow, tesseract, modplug, openmpt).
        # BASE = features supported on every triplet; the rest are gated per the
        # same platform rules vcpkg's `all`/`all-gpl` meta-features use.
        # sdl2 omitted on Linux: its vcpkg build links -liconv, but vcpkg's libiconv
        # is a glibc stub there, so the link fails. rubberband omitted: its port
        # (v4.0.0) fails to compile with modern compilers.
        BASE="gpl,aom,avcodec,avdevice,avfilter,avformat,bzip2,freetype,iconv,lzma,mp3lame,openjpeg,opus,snappy,soxr,speex,swresample,swscale,theora,twolame,vorbis,vpx,vulkan,webp,xml2,zlib,openssl,drawtext,zmq,dvdvideo,ass,fontconfig,fribidi,openh264,srt,dav1d,ilbc"
        FEATURES="$BASE,alsa,vaapi,amf,opencl,opengl,nvcodec,x264,x265"
        if [ "${{ inputs.arch }}" = "x64" ]; then
          # ssh: vcpkg port is unsupported on arm; qsv: x64-only
          FEATURES="$FEATURES,ssh,qsv"
        fi
        ./builder/vcpkg install "ffmpeg[$FEATURES]:${{ inputs.triplet }}"
        ./builder/vcpkg install "ffmpeg[$FEATURES]:${{ inputs.triplet }}-dynamic"

    - name: Build static libva + libdrm
      shell: bash
      run: |
        # vcpkg does NOT leave a static libva.a to bundle (and libdrm isn't a vcpkg
        # port at all), so FFmpeg's static .a files would have dangling va*/drm*
        # refs. Build both from source as static into a private prefix and bundle
        # them. FFmpeg's .a only records UNVERSIONED undefined symbols, so a
        # from-source libva of the SAME version FFmpeg compiled against resolves
        # them in the consumer's --start-group. Pin libva to vcpkg's libva version
        # (2.23.0); bump both together with vcpkg on upgrades.
        DRM_VERSION=2.4.124
        VA_VERSION=2.23.0
        PREFIX=$GITHUB_WORKSPACE/valibs

        # libdrm (core only; not a vcpkg port)
        curl -fsSL "https://dri.freedesktop.org/libdrm/libdrm-${DRM_VERSION}.tar.xz" -o /tmp/libdrm.tar.xz
        mkdir -p /tmp/libdrm-src
        tar -xf /tmp/libdrm.tar.xz -C /tmp/libdrm-src --strip-components=1
        meson setup /tmp/libdrm-src/build /tmp/libdrm-src \
          --prefix="$PREFIX" --libdir=lib --buildtype=release --default-library=static \
          -Dintel=disabled -Dradeon=disabled -Damdgpu=disabled -Dnouveau=disabled \
          -Dvmwgfx=disabled -Detnaviv=disabled -Dfreedreno=disabled -Dvc4=disabled \
          -Domap=disabled -Dexynos=disabled -Dtegra=disabled -Dvalgrind=disabled \
          -Dman-pages=disabled -Dtests=false
        ninja -C /tmp/libdrm-src/build install

        # libva (+ libva-drm); finds our static libdrm via PKG_CONFIG_PATH.
        # va/meson.build hard-codes shared_library() (ignoring --default-library),
        # so it would only emit libva.so. Rewrite those to meson's library()
        # wrapper, which honors --default-library=static while still accepting the
        # shared-only version/soversion/vs_module_defs kwargs. This is why vcpkg's
        # libva also never produced a static libva.a.
        curl -fsSL "https://github.com/intel/libva/archive/refs/tags/${VA_VERSION}.tar.gz" -o /tmp/libva.tar.gz
        mkdir -p /tmp/libva-src
        tar -xf /tmp/libva.tar.gz -C /tmp/libva-src --strip-components=1
        sed -i 's/shared_library(/library(/g' /tmp/libva-src/va/meson.build
        PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig" meson setup /tmp/libva-src/build /tmp/libva-src \
          --prefix="$PREFIX" --libdir=lib --buildtype=release --default-library=static \
          -Dwith_x11=no -Dwith_wayland=no -Dwith_glx=no
        ninja -C /tmp/libva-src/build install

    - name: Prepare binaries
      shell: bash
      run: |
        cp -r $GITHUB_WORKSPACE/builder/installed/${{ inputs.triplet }}/include $GITHUB_WORKSPACE/static_${{ inputs.arch }}/include
        cp $GITHUB_WORKSPACE/builder/installed/${{ inputs.triplet }}/lib/*.a $GITHUB_WORKSPACE/static_${{ inputs.arch }}/lib/
        # Bundle the from-source static VA-API stack (libva.a/libva-drm.a/libdrm.a)
        # so the consumer resolves FFmpeg's va*/drm* refs with nothing on the system.
        cp $GITHUB_WORKSPACE/valibs/lib/libva.a $GITHUB_WORKSPACE/valibs/lib/libva-drm.a $GITHUB_WORKSPACE/valibs/lib/libdrm.a $GITHUB_WORKSPACE/static_${{ inputs.arch }}/lib/
        # Strip DWARF debug info from the static .a files (it's ~90% of their size
        # and is not needed to link against them). --strip-debug keeps the symbol
        # table, so the libraries still link; native strip matches the runner arch.
        strip --strip-debug $GITHUB_WORKSPACE/static_${{ inputs.arch }}/lib/*.a

        cp -r $GITHUB_WORKSPACE/builder/installed/${{ inputs.triplet }}-dynamic/include $GITHUB_WORKSPACE/dynamic_${{ inputs.arch }}/include
        cp -a $GITHUB_WORKSPACE/builder/installed/${{ inputs.triplet }}-dynamic/lib/*.so* $GITHUB_WORKSPACE/dynamic_${{ inputs.arch }}/lib/

    - name: Zip local
      shell: bash
      run: |
        cd $GITHUB_WORKSPACE/static_${{ inputs.arch }}
        7z a -tzip -mx=9 $GITHUB_WORKSPACE/static_linux_${{ inputs.arch }}.zip include lib

        cd $GITHUB_WORKSPACE/dynamic_${{ inputs.arch }}
        7z a -tzip -mx=9 $GITHUB_WORKSPACE/dynamic_linux_${{ inputs.arch }}.zip include lib

    - name: Save artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries-linux-${{ inputs.arch }}
        path: "*.zip"
